<h2 mat-dialog-title>{{ isEdit ? 'Edit Subject' : 'Add Subject' }}</h2>

<mat-dialog-content>
  <form [formGroup]="form" class="subject-form" (ngSubmit)="onSave()">
    <button type="submit" style="display:none" [disabled]="saving"></button>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Name</mat-label>
      <input matInput formControlName="name" />
      <mat-error>Required</mat-error>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Description</mat-label>
      <textarea matInput formControlName="description" rows="3"></textarea>
    </mat-form-field>

    <mat-form-field appearance="outline" class="full-width">
      <mat-label>Class</mat-label>
      <mat-select formControlName="classId">
        @for (cls of availableClasses; track cls.id) {
          <mat-option [value]="cls.id">{{ cls.name }}</mat-option>
        }
      </mat-select>
      <mat-error>Required</mat-error>
    </mat-form-field>
  </form>
</mat-dialog-content>

<mat-dialog-actions align="end">
  <button mat-button (click)="onCancel()">Cancel</button>
  <button mat-raised-button color="primary" (click)="onSave()" [disabled]="saving">
    {{ saving ? 'Saving…' : 'Save' }}
  </button>
</mat-dialog-actions>
