<div class="list-header">
  <h2>Students</h2>
  <button mat-raised-button color="primary" (click)="openAdd()">
    <mat-icon>add</mat-icon> Add Student
  </button>
</div>

<mat-form-field appearance="outline" class="search-field">
  <mat-label>Search</mat-label>
  <mat-icon matPrefix>search</mat-icon>
  <input matInput placeholder="First name, last name, email or phone"
         [value]="searchQuery()"
         (input)="onSearch($any($event.target).value)" />
  @if (searchQuery()) {
    <button matSuffix mat-icon-button (click)="clearSearch()" title="Clear">
      <mat-icon>close</mat-icon>
    </button>
  }
</mat-form-field>

@if (loading()) {
  <div class="spinner-container">
    <mat-spinner diameter="48" />
  </div>
} @else {
  <div class="table-container mat-elevation-z2">
    <table mat-table [dataSource]="dataSource" matSort>

      <ng-container matColumnDef="lastName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Last Name</th>
        <td mat-cell *matCellDef="let s">{{ s.lastName }}</td>
      </ng-container>

      <ng-container matColumnDef="firstName">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>First Name</th>
        <td mat-cell *matCellDef="let s">{{ s.firstName }}</td>
      </ng-container>

      <ng-container matColumnDef="email">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Email</th>
        <td mat-cell *matCellDef="let s">{{ s.email }}</td>
      </ng-container>

      <ng-container matColumnDef="phoneNumber">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Phone</th>
        <td mat-cell *matCellDef="let s">{{ s.phoneNumber }}</td>
      </ng-container>

      <ng-container matColumnDef="enrolledAt">
        <th mat-header-cell *matHeaderCellDef mat-sort-header>Enrolled At</th>
        <td mat-cell *matCellDef="let s">{{ s.enrolledAt | date:'MM/dd/yy' }}</td>
      </ng-container>

      <ng-container matColumnDef="actions">
        <th mat-header-cell *matHeaderCellDef>Actions</th>
        <td mat-cell *matCellDef="let s">
          <button mat-icon-button color="primary" (click)="openEdit(s)" title="Edit">
            <mat-icon>edit</mat-icon>
          </button>
          <button mat-icon-button color="warn" (click)="delete(s)" title="Delete">
            <mat-icon>delete</mat-icon>
          </button>
          <button mat-icon-button (click)="manageEnrollments(s)" title="Manage Enrollments"
                  style="color: #5c6bc0;">
            <mat-icon>group</mat-icon>
          </button>
        </td>
      </ng-container>

      <tr mat-header-row *matHeaderRowDef="displayedColumns"></tr>
      <tr mat-row *matRowDef="let row; columns: displayedColumns;"></tr>

      <tr class="mat-row" *matNoDataRow>
        <td class="mat-cell no-data" [attr.colspan]="displayedColumns.length">
          No students found.
        </td>
      </tr>
    </table>

    <mat-paginator [pageSize]="10" [pageSizeOptions]="[10]" showFirstLastButtons />
  </div>
}
